{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.appName }}
  # namespace: teste # Deve estar no mesmo namespace
spec:
  rules:
  - host: {{ .Values.ingress.host }} # Substitua pelo seu domínio configurado no DNS
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.appName }} # Nome do Service criado acima
            port:
              number: 80
{{- end }}
