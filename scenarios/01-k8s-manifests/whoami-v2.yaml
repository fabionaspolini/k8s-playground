# v2: Sem namespace, assumir o recebido via kubectl apply -n <namespace>
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whoami
  # namespace: teste
spec:
  replicas: 3
  selector:
    matchLabels:
      app: whoami
  template:
    metadata:
      labels:
        app: whoami
    spec:
      containers:
      - name: whoami
        image: traefik/whoami:v1.11
        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: whoami
  # namespace: teste # Deve estar no mesmo namespace
spec:
  selector:
    app: whoami # Deve bater exatamente com o label do Deployment
  ports:
    - protocol: TCP
      port: 80 # Porta exposta pelo Service
      targetPort: 80 # Porta onde o container está rodando

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: whoami
  # namespace: teste # Deve estar no mesmo namespace
spec:
  rules:
  - host: whoami.localhost # Substitua pelo seu domínio configurado no DNS
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: whoami # Nome do Service criado acima
            port:
              number: 80