apiVersion: apps/v1
kind: Deployment
metadata:
  name: whoami
spec:
  replicas: 3
  selector:
    matchLabels:
      app: whoami
  template:
    metadata:
      labels:
        app: whoami
    spec:
      containers:
      - name: whoami
        image: traefik/whoami:v1.11
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "2Mi"
            cpu: "2m"
          limits:
            memory: "32Mi"
            cpu: "25m"
